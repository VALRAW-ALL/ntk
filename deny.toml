# cargo-deny configuration — license compliance + advisory gating.
# Applied by the CI `license-check` job.
#
# Rationale: NTK is MIT-licensed. Pulling in a copyleft (GPL / LGPL / AGPL)
# transitive dependency would silently force re-licensing. This file makes
# the acceptable license set explicit and fails CI when a new dep breaks it.

[graph]
# Targets we actually ship. Skipping non-default targets drops platform-
# specific deps we never link against.
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "x86_64-apple-darwin" },
  { triple = "aarch64-apple-darwin" },
  { triple = "x86_64-pc-windows-msvc" },
]

# ---------------------------------------------------------------------------
# Licenses
# ---------------------------------------------------------------------------

[licenses]
version = 2
# Permissive licenses compatible with MIT redistribution.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",
  "0BSD",
  "BSL-1.0",
  # webpki-roots bundles Mozilla's CA list under this permissive data
  # license. Data-license, not code — compatible with MIT redistribution.
  "CDLA-Permissive-2.0",
]
# Confidence threshold for SPDX detection.
confidence-threshold = 0.93

# ---------------------------------------------------------------------------
# Advisories (RUSTSEC) — mirrors .cargo/audit.toml ignores so `cargo deny
# check advisories` and `cargo audit` agree. Update both places together.
# ---------------------------------------------------------------------------

[advisories]
version = 2
ignore = [
  # Documented in .cargo/audit.toml. Keep in sync.
  "RUSTSEC-2023-0071",  # rsa — transitive through sqlx-mysql (unused feature)
  "RUSTSEC-2026-0097",  # rand — transitive, no actual attack path
  "RUSTSEC-2026-0098",  # rustls-webpki — transitive
  "RUSTSEC-2026-0099",  # rustls-webpki — transitive
  "RUSTSEC-2024-0436",  # paste — unmaintained, dev-dep only
  "RUSTSEC-2025-0134",  # rustls-pemfile — transitive
  "RUSTSEC-2026-0002",  # lru — transitive via tokenizers
]

# ---------------------------------------------------------------------------
# Bans — dependencies we refuse to pull in
# ---------------------------------------------------------------------------

[bans]
multiple-versions = "allow"  # Rust ecosystem is loose about semver major bumps
wildcards = "deny"
deny = []

# ---------------------------------------------------------------------------
# Sources — only accept crates.io and git from trusted hosts
# ---------------------------------------------------------------------------

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
