name: Release

on:
  push:
    branches: [main, master]
    paths:
      - 'Cargo.toml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. Detecta se a versão mudou ──────────────────────────────────────────
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and check tag
        id: ver
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version v$VERSION detected — will release."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ── 2. Build cross-platform (CPU + GPU por plataforma) ────────────────────
  build:
    name: Build ${{ matrix.artifact }}
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux x86_64 CPU ---------------------------------------------
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ntk-linux-x86_64-cpu
            kind: cpu
            features: sqlite-bundled

          # --- Linux x86_64 GPU (CUDA) ─────────────────────────────────────
          # Runs inside the official NVIDIA devel image: nvcc, all CUDA
          # headers (CUB, Thrust, cudart, cublas, curand), g++ and the
          # libcuda linker stub are all pre-installed. No manual install needed.
          - runner: ubuntu-latest
            container: nvidia/cuda:12.5.1-devel-ubuntu22.04
            target: x86_64-unknown-linux-gnu
            artifact: ntk-linux-x86_64-gpu
            kind: gpu
            features: sqlite-bundled,cuda
            cuda_linux: true

          # --- Linux aarch64 ------------------------------------------------
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: ntk-linux-aarch64-cpu
            kind: cpu
            features: sqlite-bundled
            linker: gcc-aarch64-linux-gnu

          # --- macOS Intel --------------------------------------------------
          - runner: macos-latest
            target: x86_64-apple-darwin
            artifact: ntk-darwin-x86_64-cpu
            kind: cpu
            features: sqlite-bundled

          # --- macOS Apple Silicon ------------------------------------------
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: ntk-darwin-aarch64-cpu
            kind: cpu
            features: sqlite-bundled

          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: ntk-darwin-aarch64-gpu
            kind: gpu
            features: sqlite-bundled,metal

          # --- Windows x86_64 CPU -------------------------------------------
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ntk-windows-x86_64-cpu.exe
            kind: cpu
            features: sqlite-bundled

          # --- Windows x86_64 GPU (CUDA) ─────────────────────────────────
          # windows-latest does NOT ship CUDA; Jimver installs it.
          # visual_studio_integration is required so nvcc finds cl.exe.
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ntk-windows-x86_64-gpu.exe
            kind: gpu
            features: sqlite-bundled,cuda
            cuda_windows: true

    steps:
      - uses: actions/checkout@v4

      # ── Linux CUDA container bootstrap ────────────────────────────────────
      # The nvidia/cuda devel image ships without build-essential (g++) and
      # curl. Both are required: g++ for nvcc to compile CUDA kernels (.cu),
      # curl for rustup. CUDA_PATH + linker stub path are also exported here.
      - name: Bootstrap (Linux CUDA container)
        if: matrix.cuda_linux == true
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl ca-certificates build-essential pkg-config libssl-dev
          CUDA=$(dirname "$(which nvcc)")/..
          CUDA=$(realpath "$CUDA")
          echo "CUDA_PATH=$CUDA"                      >> $GITHUB_ENV
          # Make nvcc and nvidia-smi discoverable by the build scripts.
          echo "$CUDA/bin"                            >> $GITHUB_PATH
          # libcuda.so stub — CI runners have no physical GPU driver.
          echo "LIBRARY_PATH=$CUDA/lib64/stubs"       >> $GITHUB_ENV
          echo "RUSTFLAGS=-L $CUDA/lib64/stubs"       >> $GITHUB_ENV
          # candle-core's build.rs calls nvidia-smi to detect the GPU compute
          # capability. Without a physical GPU, nvidia-smi returns nothing and
          # the build fails. Set CUDA_COMPUTE_CAP to sm_80 (Ampere A100) so
          # candle skips the nvidia-smi call and compiles for a known target.
          echo "CUDA_COMPUTE_CAP=80"                  >> $GITHUB_ENV

      # ── Rust toolchain (all jobs) ─────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── aarch64 cross-toolchain ───────────────────────────────────────────
      - name: Install aarch64 cross-toolchain
        if: matrix.linker != ''
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      # ── Windows CUDA install ──────────────────────────────────────────────
      # Jimver network-installs CUDA 12.5 (nvcc + dev libs + VS integration).
      # `visual_studio_integration_12.5` is required so nvcc can locate
      # cl.exe via the Windows SDK registry entries.
      - name: Install CUDA 12.5 (Windows)
        if: matrix.cuda_windows == true
        uses: Jimver/cuda-toolkit@v0.2.24
        id: cuda-toolkit
        with:
          cuda: '12.5.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "curand", "curand_dev", "visual_studio_integration"]'

      # Export paths so Rust's linker (link.exe) and cudarc find CUDA.
      - name: Configure CUDA env (Windows)
        if: matrix.cuda_windows == true
        shell: pwsh
        run: |
          $cuda = '${{ steps.cuda-toolkit.outputs.CUDA_PATH }}'
          if (-not $cuda) { $cuda = $env:CUDA_PATH }
          Write-Host "CUDA_PATH = $cuda"
          "$cuda\bin"      | Out-File $env:GITHUB_PATH -Append
          "$cuda\libnvvp"  | Out-File $env:GITHUB_PATH -Append
          "LIB=$cuda\lib\x64;$env:LIB" | Out-File $env:GITHUB_ENV -Append
          # Same as Linux: prevent candle-core from calling nvidia-smi.
          "CUDA_COMPUTE_CAP=80"        | Out-File $env:GITHUB_ENV -Append

      # ── Cargo cache ───────────────────────────────────────────────────────
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.runner }}-${{ matrix.target }}-${{ matrix.kind }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.runner }}-${{ matrix.target }}-${{ matrix.kind }}-

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        shell: bash
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            --no-default-features \
            --features ${{ matrix.features }} 2>&1 | tee /tmp/build_output.txt
          EXIT=${PIPESTATUS[0]}
          if [ "$EXIT" -ne 0 ]; then
            echo "## Build failed — cargo output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -100 /tmp/build_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/ntk ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/ntk.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── 3. Cria a release no GitHub ───────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release v${{ needs.check-version.outputs.version }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
