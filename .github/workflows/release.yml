name: Release

on:
  push:
    branches: [main, master]
    paths:
      - 'Cargo.toml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. Detecta se a versão mudou ──────────────────────────────────────────
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and check tag
        id: ver
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version v$VERSION detected — will release."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ── 2. Build cross-platform (CPU + GPU por plataforma) ────────────────────
  #
  # Dimensão `kind`:
  #   cpu → binário magro, sem Candle. GPU só via Ollama/llama-server externos.
  #   gpu → Candle in-process.
  #         • Linux/Windows x86_64 → CUDA (NVIDIA)
  #         • macOS aarch64         → Metal (Apple Silicon)
  #
  # Nome final do artefato: ntk-<os>-<arch>-<kind>[.exe]
  build:
    name: Build ${{ matrix.artifact }}
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux x86_64 CPU ---------------------------------------------
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ntk-linux-x86_64-cpu
            kind: cpu
            features: sqlite-bundled

          # --- Linux x86_64 GPU (CUDA) — runs inside the official NVIDIA
          #     CUDA dev container so every header, library, nvcc and linker
          #     stub is already present. No manual installation needed.
          - runner: ubuntu-latest
            container: nvidia/cuda:12.5.1-devel-ubuntu22.04
            target: x86_64-unknown-linux-gnu
            artifact: ntk-linux-x86_64-gpu
            kind: gpu
            features: sqlite-bundled,cuda
            cuda_linux: true

          # --- Linux aarch64 (sem GPU — nenhum backend Candle compatível) ---
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: ntk-linux-aarch64-cpu
            kind: cpu
            features: sqlite-bundled
            linker: gcc-aarch64-linux-gnu

          # --- macOS Intel (sem GPU — Candle Metal alvo é Apple Silicon) ----
          - runner: macos-latest
            target: x86_64-apple-darwin
            artifact: ntk-darwin-x86_64-cpu
            kind: cpu
            features: sqlite-bundled

          # --- macOS Apple Silicon ------------------------------------------
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: ntk-darwin-aarch64-cpu
            kind: cpu
            features: sqlite-bundled

          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: ntk-darwin-aarch64-gpu
            kind: gpu
            features: sqlite-bundled,metal

          # --- Windows x86_64 CPU -------------------------------------------
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ntk-windows-x86_64-cpu.exe
            kind: cpu
            features: sqlite-bundled

          # --- Windows x86_64 GPU (CUDA) — windows-latest has CUDA 12.5
          #     pre-installed; we just export the env vars.
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ntk-windows-x86_64-gpu.exe
            kind: gpu
            features: sqlite-bundled,cuda
            cuda_windows: true

    steps:
      - uses: actions/checkout@v4

      # The CUDA Linux container (nvidia/cuda devel image) ships without curl
      # or ca-certificates; install the bare minimum for rustup.
      - name: Bootstrap container deps (Linux CUDA container only)
        if: matrix.cuda_linux == true
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl ca-certificates gcc pkg-config libssl-dev
          # Export CUDA env vars for subsequent steps. The devel image sets
          # CUDA_HOME but not CUDA_PATH (which cudarc/candle expect).
          CUDA_DIR=$(dirname "$(which nvcc)")/../
          CUDA_DIR=$(realpath "$CUDA_DIR")
          echo "CUDA_PATH=$CUDA_DIR" >> $GITHUB_ENV
          # Link-time stub for libcuda (driver API) — the CI runner has no
          # physical GPU driver; NVIDIA ships a stub specifically for this.
          echo "LIBRARY_PATH=$CUDA_DIR/lib64/stubs:${LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "RUSTFLAGS=-L $CUDA_DIR/lib64/stubs" >> $GITHUB_ENV

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # taiki-e's action downloads a prebuilt tarball (~5 MB from CDN) and
      # sets linker env vars automatically — much faster than apt-get install.
      - name: Install aarch64 cross-toolchain
        if: matrix.linker != ''
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      # windows-latest ships CUDA 12.5 pre-installed at a fixed path.
      # We only need to export the env vars so cargo / cudarc find it.
      - name: Configure CUDA env (Windows)
        if: matrix.cuda_windows == true
        shell: pwsh
        run: |
          $cudaRoot = 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.5'
          if (-not (Test-Path "$cudaRoot\bin\nvcc.exe")) {
            # Fallback: find any installed CUDA 12.x version
            $cudaRoot = Get-ChildItem 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA' |
              Where-Object { $_.Name -like 'v12.*' } |
              Sort-Object Name -Descending |
              Select-Object -First 1 -ExpandProperty FullName
            if (-not $cudaRoot) { throw 'No CUDA 12.x found on runner' }
            Write-Host "Using CUDA at: $cudaRoot"
          }
          "CUDA_PATH=$cudaRoot"         | Out-File $env:GITHUB_ENV -Append
          "CUDA_PATH_V12_5=$cudaRoot"   | Out-File $env:GITHUB_ENV -Append
          "$cudaRoot\bin"               | Out-File $env:GITHUB_PATH -Append
          "$cudaRoot\libnvvp"           | Out-File $env:GITHUB_PATH -Append
          # Expose import libs (cuda.lib, cublas.lib, …) to the MSVC linker.
          "LIB=$cudaRoot\lib\x64;$env:LIB" | Out-File $env:GITHUB_ENV -Append

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.runner }}-${{ matrix.target }}-${{ matrix.kind }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.runner }}-${{ matrix.target }}-${{ matrix.kind }}-release-

      - name: Build
        shell: bash
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            --no-default-features \
            --features ${{ matrix.features }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/ntk ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/ntk.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── 3. Cria a release no GitHub ───────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release v${{ needs.check-version.outputs.version }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
