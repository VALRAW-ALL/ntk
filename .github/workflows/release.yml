name: Release

on:
  push:
    branches: [main, master]
    paths:
      - 'Cargo.toml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. Detecta se a versão mudou ──────────────────────────────────────────
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and check tag
        id: ver
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version v$VERSION detected — will release."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ── 2. Build cross-platform ───────────────────────────────────────────────
  build:
    name: Build ${{ matrix.artifact }}
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ntk-linux-x86_64
            ext: ""

          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: ntk-linux-aarch64
            ext: ""
            cross: true

          - runner: macos-13
            target: x86_64-apple-darwin
            artifact: ntk-darwin-x86_64
            ext: ""

          - runner: macos-14
            target: aarch64-apple-darwin
            artifact: ntk-darwin-aarch64
            ext: ""

          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ntk-windows-x86_64.exe
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross == true
        run: cargo install cross --quiet

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.runner }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.runner }}-${{ matrix.target }}-release-

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }} --no-default-features --features sqlite-bundled

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features sqlite-bundled

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/ntk ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/ntk.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── 3. Cria a release no GitHub ───────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release v${{ needs.check-version.outputs.version }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
