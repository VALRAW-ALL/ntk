name: Release

on:
  push:
    branches: [main, master]
    paths:
      - 'Cargo.toml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. Detecta se a versão mudou ──────────────────────────────────────────
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and check tag
        id: ver
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version v$VERSION detected — will release."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ── 2. Build cross-platform (CPU + GPU por plataforma) ────────────────────
  #
  # Dimensão `kind`:
  #   cpu → binário magro, sem Candle. GPU só via Ollama/llama-server externos.
  #   gpu → Candle in-process.
  #         • Linux/Windows x86_64 → CUDA (NVIDIA)
  #         • macOS aarch64         → Metal (Apple Silicon)
  #
  # Nome final do artefato: ntk-<os>-<arch>-<kind>[.exe]
  build:
    name: Build ${{ matrix.artifact }}
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux x86_64 -------------------------------------------------
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ntk-linux-x86_64-cpu
            kind: cpu
            features: sqlite-bundled

          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ntk-linux-x86_64-gpu
            kind: gpu
            features: sqlite-bundled,cuda
            cuda: true

          # --- Linux aarch64 (sem GPU — nenhum backend Candle compatível) ---
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: ntk-linux-aarch64-cpu
            kind: cpu
            features: sqlite-bundled
            linker: gcc-aarch64-linux-gnu

          # --- macOS Intel (sem GPU — Candle Metal alvo é Apple Silicon) ----
          - runner: macos-latest
            target: x86_64-apple-darwin
            artifact: ntk-darwin-x86_64-cpu
            kind: cpu
            features: sqlite-bundled

          # --- macOS Apple Silicon ------------------------------------------
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: ntk-darwin-aarch64-cpu
            kind: cpu
            features: sqlite-bundled

          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: ntk-darwin-aarch64-gpu
            kind: gpu
            features: sqlite-bundled,metal

          # --- Windows x86_64 -----------------------------------------------
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ntk-windows-x86_64-cpu.exe
            kind: cpu
            features: sqlite-bundled

          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ntk-windows-x86_64-gpu.exe
            kind: gpu
            features: sqlite-bundled,cuda
            cuda: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 cross-linker
        if: matrix.linker != ''
        run: sudo apt-get install -y ${{ matrix.linker }}

      - name: Install CUDA Toolkit
        if: matrix.cuda == true
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.5.0'
          method: 'network'
          # Minimum set required to link candle-cuda / cudarc. `cuda_runtime`
          # is NOT a valid sub-package name (runtime = `cudart`, already
          # listed); including it made apt-get exit 100 on Linux and the
          # Windows installer reject the manifest, skipping the whole build.
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "curand", "curand_dev"]'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.runner }}-${{ matrix.target }}-${{ matrix.kind }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.runner }}-${{ matrix.target }}-${{ matrix.kind }}-release-

      - name: Configure aarch64 linker
        if: matrix.linker != ''
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> $GITHUB_ENV

      - name: Build
        shell: bash
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            --no-default-features \
            --features ${{ matrix.features }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/ntk ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/ntk.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── 3. Cria a release no GitHub ───────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release v${{ needs.check-version.outputs.version }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
