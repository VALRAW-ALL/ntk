name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ---------------------------------------------------------------------------
      # Build
      # ---------------------------------------------------------------------------

      - name: Build (debug)
        run: cargo build --all-targets

      - name: Build (release)
        run: cargo build --release

      # ---------------------------------------------------------------------------
      # Lint
      # ---------------------------------------------------------------------------

      - name: Rustfmt check
        run: cargo fmt --check

      - name: Clippy (security gate — production code only)
        run: >
          cargo clippy --
          -W clippy::unwrap_used
          -W clippy::expect_used
          -W clippy::panic
          -W clippy::arithmetic_side_effects
          -D warnings

      # ---------------------------------------------------------------------------
      # Unit + integration tests (excludes slow proptest suite)
      # ---------------------------------------------------------------------------

      - name: Unit tests
        run: |
          cargo test --test layer1_tests
          cargo test --test layer2_tests
          cargo test --test detector_tests

      - name: Integration tests
        run: |
          cargo test --test compression_pipeline_tests
          cargo test --test endpoint_tests
          cargo test --test quality_regression_tests

      - name: Snapshot tests
        run: cargo test --test snapshot_tests

      # CLI binary tests require the binary to be built first.
      # NTK_SKIP_OLLAMA_INSTALL prevents ntk init from attempting to download
      # Ollama during the install/uninstall tests (which would take minutes in CI).
      - name: CLI + Ollama mock tests
        shell: bash
        env:
          NTK_SKIP_OLLAMA_INSTALL: "1"
        run: |
          cargo test --test cli_tests -- --nocapture 2>&1 | tee /tmp/cli_tests.log; CLI_EXIT=${PIPESTATUS[0]}
          cargo test --test ollama_mock_tests -- --nocapture 2>&1 | tee /tmp/ollama_tests.log; OLLAMA_EXIT=${PIPESTATUS[0]}
          echo "## CLI tests (exit $CLI_EXIT)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/cli_tests.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "## Ollama mock tests (exit $OLLAMA_EXIT)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/ollama_tests.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          [ "$CLI_EXIT" -eq 0 ] && [ "$OLLAMA_EXIT" -eq 0 ]

      # ---------------------------------------------------------------------------
      # Property-based tests (run with reduced cases on CI for speed)
      # ---------------------------------------------------------------------------

      - name: Property-based tests
        env:
          PROPTEST_CASES: 256
        run: cargo test --test compression_invariants

      # ---------------------------------------------------------------------------
      # Security audit (dependency vulnerabilities)
      # ---------------------------------------------------------------------------

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Security audit
        run: cargo audit

  # ---------------------------------------------------------------------------
  # License check (cargo-deny) — fails if any transitive dep brings in a
  # license outside the allow-list in deny.toml. Keeps NTK MIT-compatible.
  # Runs once on Linux — licenses do not depend on OS.
  # ---------------------------------------------------------------------------

  license-check:
    name: License check (cargo-deny)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ubuntu-deny-${{ hashFiles('**/Cargo.lock', 'deny.toml') }}

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --quiet

      - name: cargo deny check licenses
        run: cargo deny --all-features check licenses

      - name: cargo deny check bans
        run: cargo deny --all-features check bans

      - name: cargo deny check sources
        run: cargo deny --all-features check sources

  # ---------------------------------------------------------------------------
  # Benchmark ratio regression gate (#22)
  #
  # This is a REAL gate, not a smoke test: the ratio produced by L1+L2 is
  # a pure function of the fixture bytes — identical on every machine —
  # so we can assert it stays above the `min_ratio` floor declared in
  # each fixture's .meta.json. GitHub runners are noisy on *latency*,
  # but not on ratios, so this CI path is deterministic.
  #
  # Latency benchmarks (`cargo bench`) run in the smoke step below for
  # observability only; they never fail CI.
  # ---------------------------------------------------------------------------

  bench-regression:
    name: Bench ratio regression (deterministic)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-bench-ratio-${{ hashFiles('**/Cargo.lock') }}

      - name: Check every bench/fixtures/*.txt meets its min_ratio floor
        run: cargo test --test bench_ratios_regression --release

  # ---------------------------------------------------------------------------
  # Benchmark smoke test — informational only, never fails CI.
  # Noisy latency on shared runners can't be a contract; for reliable
  # hardware baselines, users submit `ntk bench --submit` JSON reports.
  # ---------------------------------------------------------------------------

  bench-smoke:
    name: Benchmark smoke test (informational)
    runs-on: ubuntu-latest
    continue-on-error: true  # never gate merge on latency variance

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks (informational — does not gate merges)
        run: cargo bench -- --sample-size 10 2>&1 | tail -20
